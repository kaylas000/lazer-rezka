compatibility_date = "2024-01-01"

# KV namespace для rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Переменные окружения (устанавливаются через Cloudflare Dashboard)
[vars]
# OPENAI_API_KEY устанавливается как секрет через wrangler secret put OPENAI_API_KEY
