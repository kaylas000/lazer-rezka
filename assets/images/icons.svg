<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <linearGradient id="g-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B2B"/>
      <stop offset="100%" stop-color="#FF8C55"/>
    </linearGradient>
  </defs>

  <!-- Лазерная резка -->
  <symbol id="icon-laser" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="11" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="16" cy="16" r="4" stroke="url(#g-accent)" stroke-width="2"/>
    <line x1="16" y1="5" x2="16" y2="12" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="8" x2="12" y2="12" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="12" y2="16" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="16" r="1.5" fill="#FF6B2B"/>
  </symbol>

  <!-- Гибка металла -->
  <symbol id="icon-bend" viewBox="0 0 32 32" fill="none">
    <path d="M6 26 L14 10 L20 18 L26 4" stroke="url(#g-accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="22,8 26,4 26,8" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="4" y1="28" x2="28" y2="28" stroke="url(#g-accent)" stroke-width="1.5"/>
  </symbol>

  <!-- Порошковая покраска -->
  <symbol id="icon-paint" viewBox="0 0 32 32" fill="none">
    <rect x="6" y="8" width="20" height="18" rx="2" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="14" cy="14" r="3" fill="#FF6B2B" opacity="0.4"/>
    <circle cx="21" cy="12" r="2" fill="#FF6B2B" opacity="0.3"/>
    <circle cx="17" cy="21" r="2.5" fill="#FF6B2B" opacity="0.35"/>
    <circle cx="11" cy="20" r="1.5" fill="#FF6B2B" opacity="0.25"/>
    <line x1="2" y1="6" x2="8" y2="6" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="10" y2="4" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Пескоструйная обработка -->
  <symbol id="icon-sandblast" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="11" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="11" cy="13" r="1.2" fill="#FF6B2B" opacity="0.5"/>
    <circle cx="18" cy="11" r="1" fill="#FF6B2B" opacity="0.4"/>
    <circle cx="20" cy="18" r="1.3" fill="#FF6B2B" opacity="0.45"/>
    <circle cx="13" cy="20" r="0.8" fill="#FF6B2B" opacity="0.35"/>
    <circle cx="15" cy="15" r="0.9" fill="#FF6B2B" opacity="0.3"/>
    <circle cx="9" cy="18" r="0.7" fill="#FF6B2B" opacity="0.3"/>
    <circle cx="21" cy="14" r="0.6" fill="#FF6B2B" opacity="0.25"/>
    <line x1="20" y1="5" x2="22" y2="8" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="4" x2="24" y2="8" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Сварка -->
  <symbol id="icon-weld" viewBox="0 0 32 32" fill="none">
    <path d="M5 20 L14 8 L22 16 L27 10" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="12" r="4" stroke="#FF6B2B" stroke-width="1.5" opacity="0.6"/>
    <circle cx="20" cy="12" r="2" fill="#FF6B2B" opacity="0.3"/>
    <line x1="2" y1="26" x2="30" y2="26" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="12" y1="26" x2="12" y2="24" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="20" y1="26" x2="20" y2="24" stroke="url(#g-accent)" stroke-width="1.5"/>
  </symbol>

  <!-- Скорость / быстро -->
  <symbol id="icon-speed" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="12" stroke="url(#g-accent)" stroke-width="2"/>
    <path d="M16 8 L16 16 L21 13" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 20 A10 10 0 0 1 24 20" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="23" x2="23" y2="23" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Точность -->
  <symbol id="icon-precision" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="12" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="16" cy="16" r="6" stroke="url(#g-accent)" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="1.5" fill="#FF6B2B"/>
    <line x1="16" y1="4" x2="16" y2="10" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="16" y1="22" x2="16" y2="28" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="4" y1="16" x2="10" y2="16" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="22" y1="16" x2="28" y2="16" stroke="url(#g-accent)" stroke-width="1.5"/>
  </symbol>

  <!-- Цена / выгодно -->
  <symbol id="icon-price" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="12" stroke="url(#g-accent)" stroke-width="2"/>
    <text x="16" y="21" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="13" fill="url(#g-accent)">₽</text>
    <line x1="16" y1="8" x2="16" y2="5" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="21" y1="11" x2="24" y2="9" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="23" y1="20" x2="26" y2="21" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Документы -->
  <symbol id="icon-docs" viewBox="0 0 32 32" fill="none">
    <path d="M8 4 L20 4 L26 10 L26 28 L8 28 Z" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M20 4 L20 10 L26 10" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
    <line x1="11" y1="14" x2="21" y2="14" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="18" x2="21" y2="18" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="22" x2="18" y2="22" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Надёжность / щит -->
  <symbol id="icon-shield" viewBox="0 0 32 32" fill="none">
    <path d="M16 4 L26 8 L26 16 C26 22 22 26 16 28 C10 26 6 22 6 16 L6 8 Z" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
    <polyline points="10,16 14,20 22,12" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- AI бот -->
  <symbol id="icon-ai" viewBox="0 0 32 32" fill="none">
    <rect x="4" y="6" width="24" height="20" rx="5" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="12" cy="15" r="2" fill="#FF6B2B" opacity="0.5"/>
    <circle cx="20" cy="15" r="2" fill="#FF6B2B" opacity="0.5"/>
    <path d="M12 21 C14 19 18 19 20 21" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="4" x2="19" y2="4" stroke="url(#g-accent)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="16" cy="3" r="1.5" fill="#FF6B2B"/>
  </symbol>

  <!-- Шестерня (для "Современно") -->
  <symbol id="icon-gear" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="5" stroke="url(#g-accent)" stroke-width="2"/>
    <path d="M16 4 L17.5 8 L14.5 8 Z" fill="#FF6B2B" opacity="0.5"/>
    <path d="M16 28 L17.5 24 L14.5 24 Z" fill="#FF6B2B" opacity="0.5"/>
    <path d="M4 16 L8 14.5 L8 17.5 Z" fill="#FF6B2B" opacity="0.5"/>
    <path d="M28 16 L24 14.5 L24 17.5 Z" fill="#FF6B2B" opacity="0.5"/>
    <path d="M7.5 7.5 L10.5 9.5 L8.5 12 Z" fill="#FF6B2B" opacity="0.35"/>
    <path d="M24.5 24.5 L21.5 22.5 L23.5 20 Z" fill="#FF6B2B" opacity="0.35"/>
    <path d="M7.5 24.5 L10.5 22.5 L8.5 20 Z" fill="#FF6B2B" opacity="0.35"/>
    <path d="M24.5 7.5 L21.5 9.5 L23.5 12 Z" fill="#FF6B2B" opacity="0.35"/>
  </symbol>

  <!-- Удобно / интерфейс -->
  <symbol id="icon-ux" viewBox="0 0 32 32" fill="none">
    <rect x="5" y="3" width="22" height="22" rx="3" stroke="url(#g-accent)" stroke-width="2"/>
    <line x1="5" y1="9" x2="27" y2="9" stroke="url(#g-accent)" stroke-width="1.5"/>
    <circle cx="9" cy="6" r="1" fill="#FF6B2B"/>
    <circle cx="13" cy="6" r="1" fill="#FF6B2B" opacity="0.4"/>
    <circle cx="17" cy="6" r="1" fill="#FF6B2B" opacity="0.4"/>
    <rect x="9" y="18" width="8" height="5" rx="1" stroke="url(#g-accent)" stroke-width="2"/>
    <rect x="19" y="15" width="5" height="8" rx="1" stroke="url(#g-accent)" stroke-width="2"/>
    <line x1="8" y1="26" x2="27" y2="26" stroke="url(#g-accent)" stroke-width="1.5"/>
  </symbol>

  <!-- Календарь / сроки -->
  <symbol id="icon-calendar" viewBox="0 0 32 32" fill="none">
    <rect x="4" y="6" width="24" height="22" rx="2" stroke="url(#g-accent)" stroke-width="2"/>
    <line x1="4" y1="12" x2="28" y2="12" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="10" y1="3" x2="10" y2="9" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="3" x2="22" y2="9" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="17" r="1.5" fill="#FF6B2B"/>
    <circle cx="17" cy="17" r="1.5" fill="#FF6B2B" opacity="0.4"/>
  </symbol>

  <!-- Доставка -->
  <symbol id="icon-delivery" viewBox="0 0 32 32" fill="none">
    <rect x="2" y="14" width="20" height="10" rx="2" stroke="url(#g-accent)" stroke-width="2"/>
    <line x1="6" y1="14" x2="22" y2="10" stroke="url(#g-accent)" stroke-width="1.5"/>
    <circle cx="8" cy="26" r="2.5" stroke="url(#g-accent)" stroke-width="1.5"/>
    <circle cx="20" cy="26" r="2.5" stroke="url(#g-accent)" stroke-width="1.5"/>
    <line x1="14" y1="24" x2="14" y2="24" stroke="url(#g-accent)" stroke-width="0" stroke-linecap="round"/>
  </symbol>

  <!-- Стрелка (для ссылок) -->
  <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none">
    <path d="M5 12 L19 12" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round"/>
    <polyline points="13,6 19,12 13,18" stroke="url(#g-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Телефон -->
  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none">
    <path d="M16 2 L8 2 A2 2 0 0 0 6 4 L6 20 A2 2 0 0 0 8 22 L16 22 A2 2 0 0 0 18 20 L18 4 A2 2 0 0 0 16 2 Z" stroke="url(#g-accent)" stroke-width="2"/>
    <circle cx="12" cy="18" r="1.5" fill="#FF6B2B"/>
  </symbol>

  <!-- PDF / файл -->
  <symbol id="icon-file" viewBox="0 0 32 32" fill="none">
    <path d="M8 4 L20 4 L26 10 L26 28 L8 28 Z" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M20 4 L20 10 L26 10" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
    <text x="16" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="8" fill="url(#g-accent)">PDF</text>
  </symbol>

  <!-- Звёздочка (рейтинг) -->
  <symbol id="icon-star" viewBox="0 0 24 24" fill="none">
    <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" stroke="url(#g-accent)" stroke-width="2" stroke-linejoin="round"/>
  </symbol>
</svg>
