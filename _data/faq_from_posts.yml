# Вопросы из статей блога — генерируются автоматически при публикации
- answer: Все контуры должны быть замкнуты, толщина линий — 0 (Hairline), масштаб
    1:1, единицы — миллиметры. Удалите текст и размерные линии с рабочего слоя. Используйте
    команду OVERKILL в AutoCAD для удаления дублей.
  category: technical
  post_title: Как правильно подготовить чертёж для лазерной резки металла
  post_url: /blog/2024/01/podgotovka-chertezha-dlya-lazernoj-rezki/
  question: Как правильно подготовить чертёж DXF для лазерной резки?
- answer: Для стали 1–6 мм допуск ±0.1 мм, для 6–15 мм — ±0.2 мм. Ширина реза (kerf)
    для стали 1–3 мм составляет 0.1–0.15 мм. Зона термического влияния — 0.05–0.3
    мм в зависимости от толщины.
  category: technical
  post_title: 'Допуски при лазерной резке металла: нормы и реальные значения'
  post_url: /blog/2026/04/dopuski-pogreshnosti/
  question: Какие допуски и точность при лазерной резке металла?
- answer: 'ЗТВ — узкая полоса металла вдоль реза, где от нагрева изменяется структура.
    При волоконном лазере она минимальна: 0.05–0.6 мм в зависимости от материала и
    толщины. Для нержавейки рекомендуется резка азотом и зачистка кромки.'
  category: technical
  post_title: 'Тепловое воздействие лазера на металл: что происходит в зоне реза'
  post_url: /blog/2026/04/teplovoe-vozdejstvie/
  question: Что такое зона термического влияния при лазерной резке?
- answer: 'Для металла волоконный лазер в 2–4 раза быстрее CO2 на тонких листах и
    потребляет меньше электроэнергии. CO2 лучше для неметаллов: акрил, дерево, кожа.
    Наш цех работает на волоконном лазере 3 кВт.'
  category: technical
  post_title: 'Волоконный vs CO2 лазер: что выбрать для резки металла'
  post_url: /blog/2026/04/volokonnyj-vs-co2/
  question: Волоконный или CO2 лазер — что лучше для резки металла?
- answer: Лазер даёт точность ±0.1–0.3 мм против ±0.5–2 мм у плазмы, ширину реза 0.1–0.5
    мм против 1.5–4 мм. Лазер режет отверстия от 1 мм, плазма — от 10–15 мм. Плазма
    оправдана только для металла толще 20–25 мм.
  category: technical
  post_title: 'Лазерная резка vs плазменная: когда что выбирать'
  post_url: /blog/2026/04/lazer-vs-plazma/
  question: Чем лазерная резка лучше плазменной?
- answer: Сталь 1 мм — 25–30 м/мин, 3 мм — 7–10 м/мин, 6 мм — 3–4 м/мин, 10 мм — 1.5–2
    м/мин, 20 мм — 0.4–0.7 м/мин. На реальной детали скорость ниже из-за врезок, углов
    и перемещений.
  category: technical
  post_title: 'Скорость лазерной резки металла: таблица по материалам и толщинам'
  post_url: /blog/2026/04/skorost-rezki/
  question: Какая скорость лазерной резки стали на лазере 3 кВт?
- answer: 'Кронштейны при лёгких нагрузках — 3–4 мм стали, при средних — 5–8 мм, при
    тяжёлых — 10–16 мм. Корпуса и кожухи: декоративные — 1–1.5 мм, функциональные
    — 2–3 мм, силовые — 4–6 мм.'
  category: materials
  post_title: 'Как выбрать толщину металла для лазерной резки: практическое руководство'
  post_url: /blog/2026/04/vybor-tolshchiny-metalla/
  question: Какую толщину металла выбрать для кронштейнов и корпусов?
- answer: Замкнутые контуры, толщина линий Hairline (0 мм), масштаб 1:1, единицы —
    миллиметры. Нет пересечений контуров, нет текста на слое резки. Раскройте блоки
    командой EXPLODE. Формат DXF AutoCAD 2000 или новее.
  category: technical
  post_title: 'Подготовка DXF файла для лазерной резки: требования и типичные ошибки'
  post_url: /blog/2026/04/podgotovka-dxf/
  question: Какие требования к DXF файлу для лазерной резки?
- answer: Качество торца реза зависит от толщины металла и типа лазера. Оцените по
    чистоте и отсутствию окалины. Мы достигаем точности ±0.01 мм.
  category: technical
