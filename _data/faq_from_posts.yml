# Вопросы из статей блога — генерируются автоматически при публикации
- answer: Контуры должны быть замкнуты, толщина линий — Hairline (0 мм), масштаб 1:1
    в миллиметрах. Удалите текст и размерные линии с рабочего слоя. Используйте OVERKILL
    в AutoCAD для удаления дубликатов линий. Файл сохраняйте в DXF версии AutoCAD
    2010 — универсальный формат для всех станков с ЧПУ. Подробнее в нашей статье по
    подготовке чертежей.
  category: technical
  post_title: Подготовка чертежа для лазерной резки металла — DXF/DWG требования
  post_url: /blog/2024/01/podgotovka-chertezha-dlya-lazernoj-rezki/
  question: Как подготовить DXF файл для лазерной резки металла?
- answer: 'Для стали 1–6 мм линейный допуск составляет ±0.05 мм на размерах до 100
    мм, и ±0.1 мм на 100–500 мм. С увеличением толщины появляется конусность реза:
    на стали 10 мм — до 0.2 мм. Точность позиционирования лазерной головки — ±0.01
    мм, но реальный допуск всегда больше из-за нагрева и свойств металла. Для ответственных
    сопряжений закладывайте припуск 0.1 мм на сторону.'
  category: technical
  post_title: Допуски при лазерной резке металла — ГОСТ и реальные значения
  post_url: /blog/2026/04/dopuski-pogreshnosti/
  question: Какие допуски обеспечивает лазерная резка металла?
- answer: 'Зона термического влияния (ЗТВ) — участок металла вдоль линии реза, где
    от нагрева изменилась структура. У волоконного лазера ЗТВ минимальна: 0.05–0.3
    мм для стали, 0.1–0.2 мм для нержавейки. Для сравнения: у плазменной резки ЗТВ
    в 10–20 раз шире. На качестве детали ЗТВ практически не сказывается — для конструкционных
    сталей это пренебрежимо мало.'
  category: technical
  post_title: Тепловое воздействие лазера на металл — зона термического влияния
  post_url: /blog/2026/04/teplovoe-vozdejstvie/
  question: Что такое зона термического влияния при лазерной резке?
- answer: 'Для металла однозначно волоконный лазер. Длина волны 1.06 мкм отлично поглощается
    сталью, нержавейкой и алюминием. CO2 лазер (10.6 мкм) для металла хуже: даёт более
    грубую кромку, ниже точность. Зато CO2 незаменим для акрила и дерева. Наш цех
    в Нахабино работает на волоконном лазере 3 кВт — это современный стандарт для
    металлообработки.'
  category: technical
  post_title: Волоконный лазер vs CO2 лазер — сравнение для резки металла
  post_url: /blog/2026/04/volokonnyj-vs-co2/
  question: Волоконный или CO2 лазер — что лучше для резки металла?
- answer: 'Лазер даёт точность ±0.05 мм против ±0.5 мм у плазмы — разница в 10 раз.
    Ширина реза: 0.1–0.3 мм у лазера против 1–3 мм у плазмы. Кромка после лазера чистая,
    без окалины — не требует зачистки. Плазма выигрывает только на стали толще 20
    мм. Для всего что тоньше — лазер быстрее, точнее и выгоднее.'
  category: technical
  post_title: Лазерная vs плазменная резка металла — сравнение технологий
  post_url: /blog/2026/04/lazer-vs-plazma/
  question: Чем лазерная резка лучше плазменной?
- answer: 'Сталь 1 мм — до 30 метров в минуту, сталь 3 мм — 15–20 м/мин, сталь 10
    мм — 2–3 м/мин, сталь 20 мм — около 0.5 м/мин. Скорость падает с толщиной: каждый
    следующий миллиметр даётся труднее. На реальной детали скорость ниже из-за врезок
    и углов. Для точного расчёта времени используйте наш онлайн-калькулятор.'
  category: technical
  post_title: Скорость лазерной резки металла — от чего зависит
  post_url: /blog/2026/04/skorost-rezki/
  question: С какой скоростью режется сталь на лазере 3 кВт?
- answer: 'Проведите пальцем — не должно быть заусенцев и грата. Осмотрите на просвет
    — структура равномерная. Проверьте штангенциркулем ключевые размеры. Цвет кромки:
    светлая = азотная резка (высший класс), тёмная = кислородная (норма для стали).
    Лазерная кромка готова к использованию без дополнительной обработки — это одно
    из главных преимуществ технологии.'
  category: technical
  post_title: Качество торца реза при лазерной резке
  post_url: /blog/2026/04/kachestvo-tortsa/
  question: Как оценить качество кромки после лазерной резки?
- answer: 'Для декора и табличек — сталь 1–2 мм. Для корпусов и кожухов — 1.5–3 мм.
    Для кронштейнов и крепежа — 3–5 мм. Для силовых рам и конструкций — 5–10 мм. Главное
    правило: не перестраховывайтесь с толщиной. Деталь из стали 5 мм вместо 3 мм весит
    на 60% больше и стоит на 20% дороже без реальной необходимости.'
  category: materials
  post_title: Выбор толщины металла для лазерной резки — практическое руководство
  post_url: /blog/2026/04/vybor-tolshchiny-metalla/
  question: Какую толщину металла выбрать для лазерной резки?
- answer: Файл DXF должен содержать только замкнутые контуры реза на одном слое. Толщина
    линий — Hairline (0 мм). Масштаб 1:1 в миллиметрах. Текст и размерные линии удалены
    или на отдельном слое. Блоки развёрнуты командой EXPLODE. Версия DXF — не выше
    AutoCAD 2010. Перед отправкой откройте файл в просмотрщике и убедитесь что все
    контуры отображаются.
  category: technical
  post_title: Подготовка DXF файла для лазерной резки — полное руководство
  post_url: /blog/2026/04/podgotovka-dxf/
  question: Какие требования к DXF файлу для лазерной резки?
- answer: 'На волоконном лазере 3 кВт режем нержавейку AISI 304 до 12 мм, AISI 316
    до 12 мм. Оптимальная толщина — 2–8 мм: качество кромки максимальное, скорость
    высокая. Для уличных конструкций обычно достаточно 4–6 мм. Нержавейку режем только
    с азотом — кромка остаётся светлой и сохраняет коррозионную стойкость.'
  category: materials
  post_title: Лазерная резка нержавейки AISI 304 — особенности, цены, качество
  post_url: /blog/2026/04/rezka-nerzhavejki/
  question: Какая максимальная толщина нержавейки для лазерной резки?
- answer: 'Алюминий АД31 — основной сплав для лазерной резки: хорошо режется, применяется
    в фасадах и декоре. АМГ2/АМГ3 — для сварных конструкций. Максимальная толщина
    — 10 мм на волоконном лазере 3 кВт. Алюминий режется медленнее стали из-за высокой
    теплопроводности и отражения луча — это требует опыта оператора и правильных настроек.'
  category: materials
  post_title: Лазерная резка алюминия АД31 — особенности, толщины, цены
  post_url: /blog/2026/05/rezka-alyuminiya/
  question: Какой алюминий подходит для лазерной резки?
- answer: 'Принимаем DXF, DWG, AI, CDR, SVG и векторный PDF. Предпочтительный формат
    — DXF. Процесс: отправляете файл с указанием материала, толщины и количества →
    получаете расчёт в течение 1 часа → согласовываете → забираете готовые детали.
    Минимальный заказ — 3000 рублей. Работаем с физлицами, ИП и юрлицами. Самовывоз
    из цеха в Нахабино.'
  category: process
  post_title: Как оформить заказ на лазерную резку металла — пошаговая инструкция
  post_url: /blog/2026/05/kak-oformit-zakaz/
  question: Как оформить заказ на лазерную резку и какие форматы файлов принимаете?
- answer: 'Пройдите чек-лист из 15 пунктов: контуры замкнуты, толщина линий Hairline,
    масштаб 1:1 в миллиметрах, нет дубликатов и разрывов. Проверьте что текст и размерные
    линии удалены с рабочего слоя, блоки развёрнуты, файл в DXF версии не выше 2010.
    5 минут проверки экономят часы на переделках.'
  category: tips
  post_title: Чек-лист подготовки чертежа для лазерной резки — 15 пунктов проверки
  post_url: /blog/2026/05/chek-list-chertezha/
  question: Как проверить чертёж перед отправкой на лазерную резку?
- answer: 'Главные способы экономии: оптимизируйте длину реза (уберите нефункциональные
    вырезы), компактно размещайте детали на листе, заказывайте сериями от 50 штук
    (скидка 15%), выбирайте оптимальную толщину без перезакладывания. Комплексный
    заказ (резка+гибка+покраска) выгоднее чем четыре отдельных. Экономия до 30% бюджета
    без потери качества.'
  category: prices
  post_title: Как снизить стоимость заказа на лазерную резку — 10 проверенных способов
  post_url: /blog/2026/05/kak-snizit-stoimost/
  question: Как снизить стоимость заказа на лазерную резку металла?
- answer: 'Топ-3 ошибки: незамкнутые контуры (станок не может определить что резать),
    неправильный масштаб или единицы измерения (деталь приходит в 10 раз больше или
    меньше), отверстия меньше толщины металла (лазер физически не может вырезать отверстие
    меньше толщины). Также часто забывают убрать размерные линии с рабочего слоя —
    станок режет и их.'
  category: tips
  post_title: Типичные ошибки при проектировании деталей под лазерную резку
  post_url: /blog/2026/05/tipichnye-oshibki/
  question: Какие ошибки чаще всего допускают при проектировании деталей под лазерную
    резку?
- answer: Применяя правильные методы раскроя, можно сэкономить до 30% материала. Например,
    использование программного обеспечения для оптимизации раскроя позволяет минимизировать
    отходы и увеличить эффективность производства. Рекомендуем использовать векторные
    замкнутые контуры и учитывать толщину линий 0.01 мм для точной резки.
  category: tips
  post_title: раскрой листового металла экономия материала | Москва
  post_url: /blog/2026/05/raskroj-listovogo-metalla/
  question: Как сэкономить металл при раскрое?
- answer: Для лазерной резки металла толщиной 10-20 мм используются специальные режимы,
    которые учитывают свойства материала и мощность лазера. Например, сталь Ст3 и
    09Г2С можно резать до 20 мм, а нержавейку AISI 304 и 316 - до 12 мм. Для достижения
    оптимальных результатов важно выбрать правильный режим резки и материал.
  category: technical
  post_title: лазерная резка толстого металла 10 мм | Москва
  post_url: /blog/2026/05/rezka-tolstogo-metalla/
  question: Лазерная резка 10 мм
- answer: Лазерная резка металла позволяет создавать отверстия диаметром от 0,1 мм
    с точностью ±0,01 мм. Сверловка же часто используется для больших отверстий, но
    может оставлять зазубрины и деформации. Для точных деталей лазерная резка является
    более предпочтительным вариантом.
  category: technical
  post_title: лазерная резка отверстий в металле быстро | Москва
  post_url: /blog/2026/06/otverstiya-lazer-vs-sverlovka/
  question: Лазерная резка vs сверловка
- answer: При лазерной резке металлов используются различные вспомогательные газы,
    такие как азот, кислород и воздух. Азот обычно используется для резки нержавеющей
    стали и алюминия, поскольку он не реагирует с этими материалами и обеспечивает
    высокое качество резки. Для получения оптимальных результатов рекомендуется выбирать
    газ в зависимости от типа режущего материала и требуемого качества резки.
  category: technical
  post_title: газы при лазерной резке азот кислород воздух металл | Москва
  post_url: /blog/2026/06/gazy-pri-lazernoj-rezke/
  question: Какой газ использовать при лазерной резке?
- answer: После лазерной резки металл можно гнуть с радиусом от 0,5 до 1,5 мм, в зависимости
    от толщины и типа материала. Для листов толщиной до 4 мм мы можем обеспечить угол
    гибки от 0° до 135°. При заказе рекомендуется учитывать допуски и радиусы гибки,
    чтобы получить желаемую форму без дополнительных затрат.
  category: technical
  post_title: гибка металла после лазерной резки допуски и радиусы | Москва
  post_url: /blog/2026/06/gibka-posle-lazernoj-rezki/
  question: Гибка металла после лазерной резки
- answer: Конусность реза — это явление, при котором толщина разрезаемого металла
    влияет на форму среза, делая его конусообразным. Например, при резке стальных
    листов толщиной до 20 мм конусность может достигать 0,1-0,3 мм на каждый миллиметр
    толщины. Чтобы минимизировать конусность, рекомендуется использовать более мощные
    лазеры или оптимизировать параметры резки.
  category: technical
  post_title: конусность реза лазерная резка на металле | Москва
  post_url: /blog/2026/06/konusnost-reza/
  question: Что такое конусность реза?
- answer: Лазерная резка низколегированной стали 09Г2С возможна до толщины 20 мм.
    При этом точность резки может достигать ±0,01 мм, что соответствует толщине человеческого
    волоса. Для наиболее точных результатов рекомендуется использовать векторные замкнутые
    контуры и толщину линий 0,01 мм в файлах DXF или SVG.
  category: materials
  post_title: лазерная резка низколегированной стали 09г2с | Москва
  post_url: /blog/2026/06/rezka-stali-09g2s/
  question: Лазерная резка 09Г2С
