name: PR check (Jekyll + price PDF)

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for prohibited bidi / zero-width / U+2011 Unicode
        run: python3 scripts/scan_prohibited_unicode.py

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Ruby gems
        run: bundle install

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Setup Python for price-list PDF
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate price-list PDF into _site
        run: |
          mkdir -p _site/assets/files
          python3 -m pip install -r requirements/price-list.txt
          python3 scripts/build_price_list.py --output _site/assets/files/price-list.pdf

      - name: Verify calculator embed and PDF artifact
        run: |
          grep -F "__PRICES_DATA__" _site/calculator/index.html
          test -f _site/assets/files/price-list.pdf
