# Конфигурация Jekyll для сайта цеха лазерной резки
# Версия: 2.0 — Премиум SEO + Geo-таргетинг Москва/МО

title: "Цех лазерной резки"
description: "Лазерная резка металла в Москве и Голицыно: сталь до 20мм, нержавейка до 12мм, алюминий до 10мм. Точность ±0.01мм, сроки от 1 дня. Гибка, порошковая покраска, сварка, пескоструй. Онлайн-калькулятор, приём DXF/DWG."
baseurl: ""
url: "https://ceh-lazer-rezka.ru"

# Настройки Jekyll
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/
timezone: Europe/Moscow

# Плагины
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-sass-converter

# Служебная документация (не в sitemap, noindex для поисковиков)
defaults:
  - scope:
      path: "SETUP.md"
    values:
      sitemap: false
      tech_doc_noindex: true
  - scope:
      path: "AI_SETUP.md"
    values:
      sitemap: false
      tech_doc_noindex: true
  - scope:
      path: "EMAIL_SETUP.md"
    values:
      sitemap: false
      tech_doc_noindex: true
  - scope:
      path: "FORMSPREE_SETUP.md"
    values:
      sitemap: false
      tech_doc_noindex: true
  - scope:
      path: "PHONE_UPDATE_REPORT.md"
    values:
      sitemap: false
      tech_doc_noindex: true
  # Страницы услуг — максимальный приоритет для SEO
  - scope:
      path: "pages/services"
    values:
      sitemap:
        priority: 0.9
        changefreq: "weekly"
  # Главная — максимальный приоритет
  - scope:
      path: "index.html"
    values:
      sitemap:
        priority: 1.0
        changefreq: "daily"
  # Блог — контент обновляется регулярно
  - scope:
      path: "_posts"
    values:
      sitemap:
        priority: 0.7
        changefreq: "weekly"
  # Остальные страницы
  - scope:
      path: ""
    values:
      sitemap:
        priority: 0.8
        changefreq: "monthly"

# Исключения
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
  - README.md
  - requirements
  - scripts
  - technical
  - tips
  - docs
  - AI_KEY_SETUP

# Пагинация отключена (не используется jekyll-paginate)
# paginate: 12
# paginate_path: "/blog/page:num/"

# Данные компании
company:
  name: "Цех лазерной резки"
  phone: "+7 (985) 456-37-64"
  email: "ceh-lazer-rezka@yandex.ru"
  address: "Голицыно, Заводской проспект, 34, Московская область"
  address_short: "Голицыно, Заводской проспект, 34"
  hours: "Пн-Пт 09:00-18:00"
  hours_short: "Пн–Пт 09:00–18:00"
  region: "Москва и Московская область"

# SEO
lang: ru-RU
author: "Цех лазерной резки"
geo_region: "RU-MOS"
geo_placename: "Голицыно, Московская область"
geo_position: "55.615100;36.960248"
geo_icbm: "55.615100, 36.960248"

# Social Media
logo: /assets/images/icon-512.png
social:
  name: "Цех лазерной резки"
  links:
    - https://t.me/lasercut

# Open Graph / Twitter Cards
image: /assets/images/hero.jpg
twitter:
  card: summary_large_image

# Настройки производительности
sass:
  style: compressed

# HTML сжатие
compress_html:
  clippings: all
  comments: all
  endings: all
  blanklines: false
  profile: false

# Коллекции
collections:
  services:
    output: true
    permalink: /services/:name/

# Web3Forms integration
web3forms:
  access_key: "YOUR_ACCESS_KEY_HERE"

