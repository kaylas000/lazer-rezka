<section class="location-map">
  <div class="container">
    <h2 class="section-title">Как к нам добраться</h2>
    
    <div class="location-grid">
      <div class="map-container">
        <div id="yandex-map" style="width: 100%; height: 100%;"></div>
      </div>
      
      <div class="location-info">
        <div class="location-item">
          <div class="location-icon">📍</div>
          <div>
            <h4>Адрес</h4>
            <p>Нахабино ул. Новая 7</p>
          </div>
        </div>
        
        <div class="location-item">
          <div class="location-icon">🚗</div>
          <div>
            <h4>На автомобиле</h4>
            <p>Бесплатная парковка на территории</p>
          </div>
        </div>
        
        <div class="location-item">
          <div class="location-icon">🚇</div>
          <div>
            <h4>На общественном транспорте</h4>
            <p>Электричка до станции Нахабино</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU" type="text/javascript"></script>
<script type="text/javascript">
  ymaps.ready(init);
  function init(){
    var myMap = new ymaps.Map("yandex-map", {
      center: [55.8397, 37.1742], // Координаты Нахабино
      zoom: 16,
      controls: ['zoomControl', 'fullscreenControl']
    });
    
    var myPlacemark = new ymaps.Placemark([55.8397, 37.1742], {
      balloonContent: '<strong>Цех лазерной резки</strong><br>Нахабино ул. Новая 7',
      hintContent: 'Цех лазерной резки'
    }, {
      preset: 'islands#redDotIcon'
    });
    
    myMap.geoObjects.add(myPlacemark);
  }
</script>
