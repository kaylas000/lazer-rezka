<!-- LocalBusiness Schema (global, all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["LocalBusiness", "ManufacturingBusiness"],
  "name": "{{ site.data.business.name }}",
  "legalName": "{{ site.data.business.legalName }}",
  "url": "{{ site.data.business.url }}",
  "logo": {
    "@type": "ImageObject",
    "url": "{{ '/assets/images/icon-512.png' | absolute_url }}",
    "width": 512,
    "height": 512
  },
  "image": "{{ '/assets/images/hero.jpg' | absolute_url }}",
  "description": "{{ site.data.business.description }}",
  "foundingDate": "{{ site.data.business.foundingDate }}",
  "telephone": "{{ site.data.business.phone }}",
  "email": "{{ site.data.business.email }}",
  "priceRange": "{{ site.data.business.priceRange }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.data.business.address.street }}",
    "addressLocality": "{{ site.data.business.address.locality }}",
    "addressRegion": "{{ site.data.business.address.region }}",
    "postalCode": "{{ site.data.business.address.postalCode }}",
    "addressCountry": "{{ site.data.business.address.country }}"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.data.business.geo.lat }},
    "longitude": {{ site.data.business.geo.lon }}
  },
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": {{ site.data.business.openingHours.days | jsonify }},
    "opens": "{{ site.data.business.openingHours.opens }}",
    "closes": "{{ site.data.business.openingHours.closes }}"
  },
  "areaServed": [
    { "@type": "City", "name": "Москва" },
    { "@type": "City", "name": "Нахабино" },
    { "@type": "AdministrativeArea", "name": "Московская область" }
  ],
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ site.data.business.aggregateRating.ratingValue }}",
    "reviewCount": "{{ site.data.business.aggregateRating.reviewCount }}",
    "bestRating": "5",
    "worstRating": "1"
  },
  "sameAs": {{ site.data.business.sameAs | jsonify }},
  "knowsAbout": {{ site.data.business.knowsAbout | jsonify }},
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Услуги лазерной резки и металлообработки",
    "itemListElement": [
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Лазерная резка стали",
          "description": "Резка стали Ст3, 09Г2С толщиной 1–20 мм с точностью ±0.01 мм. Москва, Нахабино.",
          "areaServed": [{"@type": "City", "name": "Москва"}, {"@type": "City", "name": "Нахабино"}]
        }
      },
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Лазерная резка нержавейки",
          "description": "Резка нержавеющей стали AISI 304/316 толщиной 1–12 мм",
          "areaServed": [{"@type": "City", "name": "Москва"}, {"@type": "City", "name": "Нахабино"}]
        }
      },
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Лазерная резка алюминия",
          "description": "Резка алюминия АД31 толщиной 1–10 мм",
          "areaServed": [{"@type": "City", "name": "Москва"}]
        }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Гибка металла", "description": "Листогибочные работы до 4 мм" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Порошковая покраска", "description": "Прочное полимерное покрытие любого цвета RAL" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Пескоструйная обработка", "description": "Очистка и подготовка металлической поверхности" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Сварочные работы", "description": "Аргонно-дуговая и полуавтоматическая сварка стали и нержавейки" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Лазерная гравировка", "description": "Гравировка на металле, нанесение логотипов и маркировка деталей" }
      }
    ]
  }
}
</script>

<!-- WebSite Schema with SearchAction -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.data.business.name }}",
  "url": "{{ site.data.business.url }}",
  "inLanguage": "ru-RU",
  "description": "{{ site.data.business.description }}"
}
</script>

<!-- BreadcrumbList Schema (all pages except home) -->
{% if page.url != '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Главная",
      "item": "{{ site.url }}"
    }
    {% if page.url contains '/blog/' and page.layout == 'post' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Блог",
      "item": "{{ site.url }}/blog/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% elsif page.url contains '/services/' and page.url != '/services/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Услуги",
      "item": "{{ site.url }}/services/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% else %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% endif %}
  ]
}
</script>
{% endif %}

<!-- Service Schema (service pages only) -->
{% if page.url contains '/services/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "name": "{{ page.title }}",
  "serviceType": "{{ page.service_type | default: page.title }}",
  "description": "{{ page.description }}",
  "provider": {
    "@type": "LocalBusiness",
    "name": "{{ site.data.business.name }}",
    "telephone": "{{ site.data.business.phone }}",
    "url": "{{ site.data.business.url }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ site.data.business.address.street }}",
      "addressLocality": "{{ site.data.business.address.locality }}",
      "addressRegion": "{{ site.data.business.address.region }}",
      "postalCode": "{{ site.data.business.address.postalCode }}",
      "addressCountry": "{{ site.data.business.address.country }}"
    }
  },
  "areaServed": [
    { "@type": "City", "name": "Москва" },
    { "@type": "City", "name": "Нахабино" },
    { "@type": "AdministrativeArea", "name": "Московская область" }
  ],
  "url": "{{ page.url | absolute_url }}"
}
</script>
{% endif %}

<!-- BlogPosting + Article Schema (blog posts only) -->
{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}",
  "image": "{{ page.image | default: '/assets/images/icon-512.png' | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "url": "{{ site.data.business.url }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/images/icon-512.png' | absolute_url }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "keywords": "{{ page.keywords | default: page.tags | join: ', ' }}",
  "speakable": {
    "@type": "SpeakableSpecification",
    "cssSelector": [".post-content p:first-of-type", ".post-content h2"]
  },
  "inLanguage": "ru-RU",
  "isAccessibleForFree": true
}
</script>
{% endif %}
