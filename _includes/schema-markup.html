<!-- LocalBusiness + Manufacturer Schema (all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["LocalBusiness", "Manufacturer"],
  "@id": "{{ site.data.business.url }}/#business",
  "name": "{{ site.data.business.name }}",
  "legalName": "{{ site.data.business.legalName }}",
  "url": "{{ site.data.business.url }}",
  "logo": {
    "@type": "ImageObject",
    "url": "{{ '/assets/images/icon-512.png' | absolute_url }}",
    "width": 512,
    "height": 512
  },
  "image": "{{ '/assets/images/hero.jpg' | absolute_url }}",
  "description": "{{ site.data.business.description }}",
  "foundingDate": "{{ site.data.business.foundingDate }}",
  "telephone": "{{ site.data.business.phone }}",
  "email": "{{ site.data.business.email }}",
  "priceRange": "{{ site.data.business.priceRange }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.data.business.address.street }}",
    "addressLocality": "{{ site.data.business.address.locality }}",
    "addressRegion": "{{ site.data.business.address.region }}",
    "postalCode": "{{ site.data.business.address.postalCode }}",
    "addressCountry": "{{ site.data.business.address.country }}"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.data.business.geo.lat }},
    "longitude": {{ site.data.business.geo.lon }}
  },
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": {{ site.data.business.openingHours.days | jsonify }},
    "opens": "{{ site.data.business.openingHours.opens }}",
    "closes": "{{ site.data.business.openingHours.closes }}"
  },
  "areaServed": [
    {% for city in site.data.business.areaServed.cities %}
    { "@type": "City", "name": "{{ city }}" }{% unless forloop.last %},{% endunless %}
    {% endfor %},
    { "@type": "AdministrativeArea", "name": "{{ site.data.business.areaServed.region }}" }
  ],
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ site.data.business.aggregateRating.ratingValue }}",
    "reviewCount": "{{ site.data.business.aggregateRating.reviewCount }}",
    "bestRating": "5",
    "worstRating": "1"
  },
  "sameAs": {{ site.data.business.sameAs | jsonify }},
  "knowsAbout": {{ site.data.business.knowsAbout | jsonify }},
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Услуги лазерной резки и металлообработки в Москве и Московской области",
    "itemListElement": [
      {% for service in site.data.business.services %}
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "{{ service.name }}",
          "description": "{{ service.description }}. {{ service.thickness }}. {{ service.price }}.",
          "areaServed": [
            { "@type": "City", "name": "Москва" },
            { "@type": "City", "name": "Голицыно" }
          ],
          "provider": { "@id": "{{ site.data.business.url }}/#business" }
        }
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
}
</script>

<!-- WebSite Schema with SearchAction -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "{{ site.data.business.url }}/#website",
  "name": "{{ site.data.business.name }}",
  "url": "{{ site.data.business.url }}",
  "inLanguage": "ru-RU",
  "description": "{{ site.data.business.description }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ site.data.business.url }}/search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>

<!-- BreadcrumbList Schema (all pages except home) -->
{% if page.url != '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Главная",
      "item": "{{ site.url }}"
    }
    {% if page.url contains '/blog/' and page.layout == 'post' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Блог",
      "item": "{{ site.url }}/blog/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% elsif page.url contains '/services/' and page.url != '/services/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Услуги",
      "item": "{{ site.url }}/services/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% else %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% endif %}
  ]
}
</script>
{% endif %}

<!-- Service Schema (service pages) -->
{% if page.url contains '/services/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "name": "{{ page.title | escape }}",
  "serviceType": "{{ page.service_type | default: page.title | escape }}",
  "description": "{{ page.description | escape }}",
  "provider": { "@id": "{{ site.data.business.url }}/#business" },
  "areaServed": [
    { "@type": "City", "name": "Москва" },
    { "@type": "City", "name": "Голицыно" },
    { "@type": "AdministrativeArea", "name": "Московская область" }
  ],
  "url": "{{ page.url | absolute_url }}"
}
</script>
{% endif %}

<!-- BlogPosting Schema (blog posts) -->
{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 | escape }}",
  "image": "{{ page.image | default: '/assets/images/icon-512.png' | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "url": "{{ site.data.business.url }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/images/icon-512.png' | absolute_url }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "keywords": "{{ page.keywords | default: page.tags | join: ', ' | escape }}",
  "inLanguage": "ru-RU",
  "isAccessibleForFree": true
}
</script>
{% endif %}

<!-- Organization Schema (second instance for certainty) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": "{{ site.data.business.url }}/#organization",
  "name": "{{ site.data.business.name }}",
  "url": "{{ site.data.business.url }}",
  "logo": "{{ '/assets/images/icon-512.png' | absolute_url }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "{{ site.data.business.phone }}",
    "contactType": "sales",
    "availableLanguage": "Russian"
  },
  "sameAs": {{ site.data.business.sameAs | jsonify }}
}
</script>

<!-- FAQPage Schema (FAQ page only) -->
{% if page.url == '/faq/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Сколько стоит лазерная резка металла?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Стоимость зависит от материала и толщины. Сталь Ст3: от 56 ₽/пог.м (1 мм) до 520 ₽/пог.м (20 мм). Нержавейка AISI 304: от 73 ₽/пог.м. Алюминий: от 70 ₽/пог.м. Точную цену считаем по чертежу за 1 час."
      }
    },
    {
      "@type": "Question",
      "name": "Какой минимальный заказ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Минимальная сумма заказа — 3000 рублей. При серийном заказе от 50 деталей — скидка 15%. Для постоянных клиентов действует накопительная система скидок."
      }
    },
    {
      "@type": "Question",
      "name": "Какая точность лазерной резки?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Точность позиционирования лазерной головки — ±0.01 мм. Реальный допуск на детали: для стали до 6 мм — ±0.05 мм на размерах до 100 мм. Для стали 6–12 мм — ±0.1 мм."
      }
    },
    {
      "@type": "Question",
      "name": "Какие форматы файлов принимаете?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Принимаем DXF (предпочтительный), DWG, AI, CDR, SVG и векторный PDF. Контуры должны быть замкнутыми, толщина линий — Hairline, масштаб 1:1, единицы — миллиметры."
      }
    },
    {
      "@type": "Question",
      "name": "Какие сроки изготовления?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Стандартный заказ — 1–3 рабочих дня. Срочный — в день обращения (до 16:00). Крупная серия — 3–7 рабочих дней."
      }
    },
    {
      "@type": "Question",
      "name": "Где находится цех?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Цех расположен в Голицыно, Московская область, Заводской проспект, 34. Работаем Пн–Пт 09:00–18:00. Бесплатная парковка."
      }
    },
    {
      "@type": "Question",
      "name": "Какие металлы режете?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Сталь конструкционная (Ст3, 09Г2С) — до 20 мм. Нержавейка AISI 304, 316 — до 12 мм. Алюминий АД31, АМГ — до 10 мм. Также оцинкованная сталь."
      }
    },
    {
      "@type": "Question",
      "name": "Как оформить заказ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "1) Подготовьте файл DXF/DWG. 2) Отправьте через форму на сайте или на email. 3) Получите расчёт в течение 1 часа. 4) После согласования запускаем в производство."
      }
    }
  ]
}
</script>
{% endif %}

<!-- Product Schema (calculator page) -->
{% if page.url == '/calculator/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "Лазерная резка металла — калькулятор стоимости",
  "description": "Онлайн-калькулятор для расчёта стоимости лазерной резки металла. Автоматический расчёт по актуальным тарифам.",
  "brand": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}"
  },
  "offers": {
    "@type": "AggregateOffer",
    "lowPrice": "56",
    "highPrice": "520",
    "priceCurrency": "RUB",
    "offerCount": "6",
    "availability": "https://schema.org/InStock"
  }
}
</script>
{% endif %}
